server {
    listen 80;
    root /var/www/html/web;
    index index.php;
    # Match PHP's upload_max_filesize (default nginx cap is 1m → 413s)
    client_max_body_size 128m;
    # Container listens on 80 but is published on 8080 — relative redirects
    # keep the browser's host:port intact.
    absolute_redirect off;

    # Main-site content links to the store with root-relative URLs, but the
    # store page lives on the /wolfthemes subsite — redirect across sites.
    rewrite ^/wordpress-themes/?$ /wolfthemes/wordpress-themes/ permanent;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Subdirectory multisite on Bedrock: core files live under /wp/, so
    # subsite requests like /site2/wp-admin or /site2/wp-login.php must be
    # rewritten to /wp/wp-admin etc. (slug stripped, /wp prefix added).
    if (!-e $request_filename) {
        rewrite /wp-admin$ $uri/ permanent;
        rewrite ^(/[_0-9a-zA-Z-]+)?(/wp-.*) /wp$2 last;
        rewrite ^(/[_0-9a-zA-Z-]+)?(/.*\.php)$ /wp$2 last;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
