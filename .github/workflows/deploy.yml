name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # pins theme/plugin repos to a specific commit

      # Theme/plugin repos build their own assets in their own pipeline and
      # commit the build output — the submodule checkout above already has
      # it. If you'd rather not commit build output, replace this step with
      # actions/download-artifact pulling the latest build from each repo's
      # own workflow run instead.

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to server
        run: |
          echo "ssh into server, pull image, restart container"
          # ssh deploy@staging20 "docker pull ghcr.io/${{ github.repository }}:${{ github.sha }} && docker compose pull && docker compose up -d"
