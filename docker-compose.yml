# Pin the project name so `docker compose up` reuses the same containers/volumes
# from any path alias (WSL bind-mount hash dir, /mnt/c, symlink).
name: wolf-bedrock-infra

services:

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  php:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/var/www/html
      # Named volume: the Windows bind mount forbids chmod for www-data,
      # which breaks WP media/import uploads with chmod() warnings.
      - uploads:/var/www/html/web/app/uploads
    working_dir: /var/www/html

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - uploads:/var/www/html/web/app/uploads
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf

  # Optional DB GUI — visit http://localhost:8081
  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"

volumes:
  db_data:
  uploads:
